<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 636 1048" width="636" height="1048">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1030"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="eng1" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow1" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow1" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="636" height="1048" fill="url(#bg1)"/>

  <!-- Stars -->
  <circle cx="50" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="180" cy="40" r="1" fill="white" opacity="0.4"/>
  <circle cx="320" cy="90" r="1.8" fill="white" opacity="0.5"/>
  <circle cx="490" cy="55" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="580" cy="130" r="1" fill="white" opacity="0.4"/>
  <circle cx="90" cy="200" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="560" cy="260" r="1.2" fill="white" opacity="0.4"/>
  <circle cx="30" cy="350" r="1" fill="white" opacity="0.3"/>
  <circle cx="600" cy="400" r="1.8" fill="white" opacity="0.5"/>
  <circle cx="140" cy="480" r="1" fill="white" opacity="0.4"/>
  <circle cx="510" cy="510" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="70" cy="620" r="1.2" fill="white" opacity="0.5"/>
  <circle cx="590" cy="650" r="1" fill="white" opacity="0.4"/>
  <circle cx="250" cy="700" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="420" cy="760" r="1" fill="white" opacity="0.4"/>

  <!-- HUD top bar -->
  <rect x="0" y="0" width="636" height="56" fill="#0a0a0f" opacity="0.85"/>

  <!-- XP bar -->
  <rect x="0" y="56" width="636" height="7" fill="#1a1a2e"/>
  <rect x="0" y="56" width="420" height="7" fill="#b388ff"/>

  <!-- HUD text -->
  <text x="30" y="36" font-family="monospace" font-size="22" fill="#00e5ff" font-weight="bold">SCORE 1847</text>
  <text x="270" y="36" font-family="monospace" font-size="22" fill="#ffd60a" font-weight="bold" text-anchor="middle">STAGE 5</text>
  <text x="606" y="36" font-family="monospace" font-size="22" fill="#b388ff" font-weight="bold" text-anchor="end">LV 8</text>

  <!-- Enemies -->
  <!-- Row 1 -->
  <circle cx="120" cy="160" r="20" fill="#ff2d55" filter="url(#glow1)" opacity="0.7"/>
  <circle cx="120" cy="160" r="14" fill="#ff2d55"/>
  <circle cx="280" cy="140" r="15" fill="#ff9f0a" filter="url(#glow1)" opacity="0.7"/>
  <circle cx="280" cy="140" r="10" fill="#ff9f0a"/>
  <circle cx="430" cy="170" r="20" fill="#bf5af2" filter="url(#glow1)" opacity="0.7"/>
  <circle cx="430" cy="170" r="14" fill="#bf5af2"/>
  <circle cx="570" cy="145" r="18" fill="#30d158" filter="url(#glow1)" opacity="0.7"/>
  <circle cx="570" cy="145" r="12" fill="#30d158"/>

  <!-- Row 2 -->
  <circle cx="60" cy="270" r="20" fill="#ff2d55" filter="url(#glow1)" opacity="0.8"/>
  <circle cx="60" cy="270" r="14" fill="#ff2d55"/>
  <circle cx="200" cy="250" r="26" fill="#ffd60a" filter="url(#glow1)" opacity="0.7"/>
  <circle cx="200" cy="250" r="20" fill="#ffd60a"/>
  <circle cx="370" cy="280" r="20" fill="#5ac8fa" filter="url(#glow1)" opacity="0.6"/>
  <circle cx="370" cy="280" r="14" fill="#5ac8fa"/>
  <circle cx="520" cy="255" r="15" fill="#ff9f0a" filter="url(#glow1)" opacity="0.7"/>
  <circle cx="520" cy="255" r="10" fill="#ff9f0a"/>

  <!-- Row 3 -->
  <circle cx="150" cy="370" r="28" fill="#8e9fb5" filter="url(#glow1)" opacity="0.7"/>
  <circle cx="150" cy="370" r="22" fill="#8e9fb5"/>
  <circle cx="340" cy="350" r="20" fill="#ff2d55" filter="url(#glow1)" opacity="0.7"/>
  <circle cx="340" cy="350" r="14" fill="#ff2d55"/>
  <circle cx="490" cy="380" r="20" fill="#bf5af2" filter="url(#glow1)" opacity="0.8"/>
  <circle cx="490" cy="380" r="14" fill="#bf5af2"/>

  <!-- Hit effects: rings -->
  <circle cx="200" cy="250" r="34" fill="none" stroke="rgba(255,120,50,0.6)" stroke-width="2.5"/>
  <circle cx="200" cy="250" r="44" fill="none" stroke="rgba(255,120,50,0.3)" stroke-width="1.5"/>

  <!-- +1 text effects -->
  <text x="200" y="215" font-family="monospace" font-size="20" fill="#ffd60a" text-anchor="middle" opacity="0.9">+1</text>
  <text x="370" y="245" font-family="monospace" font-size="20" fill="#ffd60a" text-anchor="middle" opacity="0.7">+1</text>

  <!-- Bullets -->
  <circle cx="318" cy="440" r="4" fill="white" opacity="0.9"/>
  <circle cx="296" cy="420" r="4" fill="white" opacity="0.85"/>
  <circle cx="340" cy="400" r="4" fill="white" opacity="0.8"/>
  <circle cx="318" cy="380" r="4" fill="white" opacity="0.75"/>
  <circle cx="270" cy="460" r="4" fill="white" opacity="0.7"/>
  <circle cx="366" cy="460" r="4" fill="white" opacity="0.7"/>
  <circle cx="248" cy="430" r="4" fill="white" opacity="0.65"/>
  <circle cx="388" cy="430" r="4" fill="white" opacity="0.65"/>

  <!-- Homing missile -->
  <circle cx="400" cy="380" r="5" fill="#00e5ff" filter="url(#glow1)"/>

  <!-- Laser beams (left wing) -->
  <line x1="268" y1="760" x2="120" y2="160" stroke="#ff6060" stroke-width="2.5" opacity="0.5" filter="url(#glow1)"/>
  <line x1="368" y1="760" x2="570" y2="145" stroke="#ff6060" stroke-width="2.5" opacity="0.5" filter="url(#glow1)"/>

  <!-- Shield -->
  <circle cx="318" cy="790" r="90" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.3" stroke-dasharray="10 7"/>

  <!-- Orbs -->
  <circle cx="408" cy="790" r="7" fill="#b388ff" filter="url(#glow1)"/>
  <circle cx="228" cy="790" r="7" fill="#b388ff" filter="url(#glow1)"/>

  <!-- Ship engine glow -->
  <ellipse cx="318" cy="870" rx="40" ry="18" fill="url(#eng1)" opacity="0.9"/>
  <ellipse cx="318" cy="866" rx="20" ry="12" fill="#fbbf24" filter="url(#glow1)"/>
  <ellipse cx="318" cy="870" rx="12" ry="7" fill="#fde68a"/>
  <ellipse cx="318" cy="872" rx="6" ry="4" fill="white" opacity="0.9"/>

  <!-- Ship wings -->
  <polygon points="268,820 180,870 210,760 278,775" fill="#1d4ed8"/>
  <polygon points="268,820 180,870 210,760 278,775" fill="#3b82f6" opacity="0.5"/>
  <polygon points="368,820 456,870 426,760 358,775" fill="#1d4ed8"/>
  <polygon points="368,820 456,870 426,760 358,775" fill="#3b82f6" opacity="0.5"/>

  <!-- Left mini-wing -->
  <polygon points="238,800 190,820 208,770" fill="#2563eb" opacity="0.7"/>
  <!-- Right mini-wing -->
  <polygon points="398,800 446,820 428,770" fill="#2563eb" opacity="0.7"/>

  <!-- Ship body -->
  <polygon points="318,720 368,860 318,840 268,860" fill="#1e40af"/>
  <polygon points="318,720 368,860 318,840 268,860" fill="#3b82f6" opacity="0.4"/>
  <polygon points="318,732 328,852 318,842 308,852" fill="#60a5fa" opacity="0.3"/>

  <!-- Cockpit -->
  <ellipse cx="318" cy="780" rx="34" ry="46" fill="#1e3a8a"/>
  <ellipse cx="318" cy="776" rx="26" ry="36" fill="#2563eb"/>
  <ellipse cx="318" cy="770" rx="18" ry="26" fill="#93c5fd" opacity="0.5"/>
  <ellipse cx="311" cy="762" rx="7" ry="11" fill="white" opacity="0.2"/>

  <!-- Nose -->
  <circle cx="318" cy="724" r="5" fill="#93c5fd" filter="url(#glow1)"/>

  <!-- Enemy bullet coming at player -->
  <circle cx="260" cy="680" r="6" fill="#ff453a" filter="url(#glow1)"/>
  <circle cx="400" cy="700" r="6" fill="#ff453a" filter="url(#glow1)"/>

  <!-- Bottom caption bar -->
  <rect x="0" y="940" width="636" height="108" fill="#050510" opacity="0.95"/>
  <line x1="0" y1="940" x2="636" y2="940" stroke="#00e5ff" stroke-width="1.5" opacity="0.4"/>
  <text x="318" y="986" font-family="Arial Black, Arial, sans-serif" font-size="32" fill="#00e5ff" text-anchor="middle" font-weight="900" filter="url(#textGlow1)">자동 전투 &amp; 생존</text>
  <text x="318" y="1022" font-family="Arial, sans-serif" font-size="20" fill="#93c5fd" text-anchor="middle" opacity="0.8">손가락 하나로 조작하는 스페이스 슈터</text>
</svg>
