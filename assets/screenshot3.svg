  <rect x="0" y="56" width="550" height="7" fill="#b388ff"/>
  <text x="30" y="36" font-family="monospace" font-size="22" fill="#00e5ff" font-weight="bold">SCORE 3210</text>
  <text x="270" y="36" font-family="monospace" font-size="22" fill="#ffd60a" font-weight="bold" text-anchor="middle">STAGE 8</text>
  <text x="606" y="36" font-family="monospace" font-size="22" fill="#b388ff" font-weight="bold" text-anchor="end">LV 12</text>

