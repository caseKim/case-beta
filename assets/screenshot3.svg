  <polygon points="368,762 456,812 426,700 358,715" fill="#1d4ed8"/>
  <polygon points="368,762 456,812 426,700 358,715" fill="#3b82f6" opacity="0.5"/>
  <polygon points="238,742 190,760 208,710" fill="#2563eb" opacity="0.7"/>
  <polygon points="398,742 446,760 428,710" fill="#2563eb" opacity="0.7"/>

