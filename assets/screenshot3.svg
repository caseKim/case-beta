  <circle cx="295" cy="530" r="4" fill="white" opacity="0.9"/>
  <circle cx="341" cy="530" r="4" fill="white" opacity="0.9"/>
  <circle cx="272" cy="510" r="4" fill="white" opacity="0.85"/>
  <circle cx="364" cy="510" r="4" fill="white" opacity="0.85"/>
  <circle cx="250" cy="490" r="4" fill="white" opacity="0.8"/>
