<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 636 1048" width="636" height="1048">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#150a20"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="eng3" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="waveGlow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ff2d55" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0a0a0f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow3" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow3" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="warnGlow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="636" height="1048" fill="url(#bg3)"/>
  <rect width="636" height="1048" fill="url(#waveGlow)"/>

  <!-- Stars -->
  <circle cx="70" cy="100" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="220" cy="65" r="1" fill="white" opacity="0.4"/>
  <circle cx="400" cy="85" r="1.8" fill="white" opacity="0.5"/>
