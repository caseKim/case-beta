  <ellipse cx="318" cy="716" rx="26" ry="36" fill="#2563eb"/>
  <ellipse cx="318" cy="710" rx="18" ry="26" fill="#93c5fd" opacity="0.5"/>
  <ellipse cx="311" cy="702" rx="7" ry="11" fill="white" opacity="0.2"/>
  <circle cx="318" cy="664" r="5" fill="#93c5fd" filter="url(#glow3)"/>

  <!-- Stage number flash -->
  <text x="318" y="880" font-family="Arial Black, Arial, sans-serif" font-size="52" fill="#ffd60a" text-anchor="middle" font-weight="900" opacity="0.08" filter="url(#textGlow3)">STAGE 8</text>

  <!-- Bottom caption bar -->
  <rect x="0" y="940" width="636" height="108" fill="#050510" opacity="0.95"/>
  <line x1="0" y1="940" x2="636" y2="940" stroke="#ff9f0a" stroke-width="1.5" opacity="0.5"/>
  <text x="318" y="986" font-family="Arial Black, Arial, sans-serif" font-size="32" fill="#ff9f0a" text-anchor="middle" font-weight="900" filter="url(#textGlow3)">웨이브 &amp; 다양한 적</text>
  <text x="318" y="1022" font-family="Arial, sans-serif" font-size="20" fill="#fbbf24" text-anchor="middle" opacity="0.8">8가지 개성 있는 적과의 스테이지 전투</text>
