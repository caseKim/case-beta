  <circle cx="110" cy="400" r="24" fill="#ffd60a" filter="url(#glow3)" opacity="0.85"/>
  <circle cx="110" cy="400" r="20" fill="#ffd60a"/>
  <circle cx="196" cy="390" r="18" fill="#ff2d55" filter="url(#glow3)" opacity="0.9"/>
