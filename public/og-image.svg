<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b388ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#b388ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="blur-md">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="glow-cyan-filter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple-filter">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="400" cy="315" rx="320" ry="280" fill="url(#glow-cyan)"/>
  <ellipse cx="860" cy="315" rx="280" ry="240" fill="url(#glow-purple)"/>

  <!-- Stars (background dots) -->
  <g fill="#ffffff">
    <circle cx="80" cy="45" r="1" opacity="0.4"/>
    <circle cx="210" cy="120" r="1.5" opacity="0.3"/>
    <circle cx="340" cy="30" r="1" opacity="0.5"/>
    <circle cx="520" cy="80" r="1" opacity="0.3"/>
    <circle cx="670" cy="55" r="1.5" opacity="0.4"/>
    <circle cx="820" cy="20" r="1" opacity="0.3"/>
    <circle cx="950" cy="90" r="1" opacity="0.5"/>
    <circle cx="1080" cy="40" r="1.5" opacity="0.3"/>
    <circle cx="1150" cy="130" r="1" opacity="0.4"/>
    <circle cx="60" cy="200" r="1" opacity="0.3"/>
    <circle cx="160" cy="320" r="1.5" opacity="0.2"/>
    <circle cx="1100" cy="280" r="1" opacity="0.3"/>
    <circle cx="1020" cy="420" r="1.5" opacity="0.4"/>
    <circle cx="900" cy="560" r="1" opacity="0.3"/>
    <circle cx="750" cy="590" r="1.5" opacity="0.2"/>
    <circle cx="450" cy="580" r="1" opacity="0.4"/>
    <circle cx="280" cy="540" r="1" opacity="0.3"/>
    <circle cx="120" cy="480" r="1.5" opacity="0.2"/>
    <circle cx="1160" cy="500" r="1" opacity="0.3"/>
    <circle cx="580" cy="560" r="1" opacity="0.4"/>
    <circle cx="720" cy="150" r="1" opacity="0.3"/>
    <circle cx="980" cy="200" r="1.5" opacity="0.2"/>
    <circle cx="200" cy="420" r="1" opacity="0.3"/>
    <circle cx="380" cy="480" r="1" opacity="0.4"/>
  </g>

  <!-- ── Enemies (right side) ── -->
  <!-- Red basic enemy -->
  <circle cx="820" cy="160" r="14" fill="#ff453a" opacity="0.9"/>
  <circle cx="820" cy="160" r="14" fill="#ff453a" opacity="0.3" filter="url(#blur-sm)"/>

  <!-- Purple homing enemy -->
  <circle cx="890" cy="240" r="14" fill="#bf5af2" opacity="0.9"/>
  <circle cx="890" cy="240" r="14" fill="#bf5af2" opacity="0.3" filter="url(#blur-sm)"/>

  <!-- Green shooter enemy -->
  <circle cx="960" cy="185" r="12" fill="#30d158" opacity="0.9"/>
  <circle cx="960" cy="185" r="12" fill="#30d158" opacity="0.3" filter="url(#blur-sm)"/>

  <!-- Yellow splitter -->
  <circle cx="850" cy="310" r="20" fill="#ffd60a" opacity="0.85"/>
  <circle cx="850" cy="310" r="20" fill="#ffd60a" opacity="0.25" filter="url(#blur-sm)"/>

  <!-- Cyan ghost -->
  <circle cx="940" cy="340" r="14" fill="#5ac8fa" opacity="0.7"/>
  <circle cx="940" cy="340" r="14" fill="#5ac8fa" opacity="0.2" filter="url(#blur-sm)"/>

  <!-- Metallic armored -->
  <circle cx="1020" cy="270" r="22" fill="#8e9fb5" opacity="0.85"/>
  <circle cx="1020" cy="270" r="22" fill="#8e9fb5" opacity="0.2" filter="url(#blur-sm)"/>

  <!-- More enemies scattered -->
  <circle cx="780" cy="420" r="14" fill="#ff453a" opacity="0.8"/>
  <circle cx="1070" cy="380" r="14" fill="#bf5af2" opacity="0.7"/>
  <circle cx="870" cy="470" r="12" fill="#30d158" opacity="0.75"/>
  <circle cx="990" cy="450" r="14" fill="#ff453a" opacity="0.6"/>
  <circle cx="1100" cy="180" r="14" fill="#ffd60a" opacity="0.7"/>

  <!-- ── Bullets (cyan dots traveling up) ── -->
  <g filter="url(#glow-cyan-filter)">
    <circle cx="395" cy="360" r="5" fill="#00e5ff" opacity="0.95"/>
    <circle cx="405" cy="290" r="5" fill="#00e5ff" opacity="0.85"/>
    <circle cx="395" cy="210" r="5" fill="#00e5ff" opacity="0.7"/>
    <circle cx="405" cy="140" r="5" fill="#00e5ff" opacity="0.5"/>
    <!-- Wing bullets -->
    <circle cx="360" cy="330" r="4" fill="#00e5ff" opacity="0.8"/>
    <circle cx="360" cy="265" r="4" fill="#00e5ff" opacity="0.65"/>
    <circle cx="430" cy="320" r="4" fill="#00e5ff" opacity="0.8"/>
    <circle cx="430" cy="250" r="4" fill="#00e5ff" opacity="0.65"/>
  </g>

  <!-- ── Player ship ── -->
  <g transform="translate(400, 460)">
    <!-- Shield glow -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="#00e5ff" stroke-width="1.5" opacity="0.25"/>
    <circle cx="0" cy="0" r="36" fill="#00e5ff" opacity="0.04" filter="url(#blur-md)"/>

    <!-- Wing companions -->
    <!-- Left wing -->
    <circle cx="-30" cy="4" r="8" fill="#00e5ff" opacity="0.85" filter="url(#blur-sm)"/>
    <circle cx="-30" cy="4" r="8" fill="#00e5ff" opacity="0.5"/>
    <!-- Right wing -->
    <circle cx="30" cy="4" r="8" fill="#00e5ff" opacity="0.85" filter="url(#blur-sm)"/>
    <circle cx="30" cy="4" r="8" fill="#00e5ff" opacity="0.5"/>

    <!-- Player body glow -->
    <circle cx="0" cy="0" r="18" fill="#00e5ff" opacity="0.2" filter="url(#blur-md)"/>
    <!-- Player body -->
    <circle cx="0" cy="0" r="18" fill="#00e5ff" opacity="0.95"/>
    <circle cx="0" cy="0" r="18" fill="#0a0a0f" opacity="0.4"/>
    <!-- Inner highlight -->
    <circle cx="-4" cy="-5" r="7" fill="#00e5ff" opacity="0.6"/>
  </g>

  <!-- ── XP bar (bottom, subtle) ── -->
  <rect x="310" y="520" width="180" height="3" rx="1.5" fill="#1a1a2e"/>
  <rect x="310" y="520" width="110" height="3" rx="1.5" fill="#b388ff" opacity="0.7"/>

  <!-- ── Divider line ── -->
  <line x1="600" y1="80" x2="600" y2="550" stroke="#1e1e2e" stroke-width="1" opacity="0.6"/>

  <!-- ── Text (left side) ── -->
  <!-- VOID -->
  <text x="110" y="290"
    font-family="monospace, 'Courier New', Courier"
    font-size="108"
    font-weight="700"
    letter-spacing="8"
    fill="#00e5ff"
    opacity="0.95"
    filter="url(#glow-cyan-filter)">VOID</text>

  <!-- SURVIVOR -->
  <text x="110" y="390"
    font-family="monospace, 'Courier New', Courier"
    font-size="60"
    font-weight="700"
    letter-spacing="10"
    fill="#ffffff"
    opacity="0.75">SURVIVOR</text>

  <!-- Tagline -->
  <text x="110" y="445"
    font-family="monospace, 'Courier New', Courier"
    font-size="18"
    letter-spacing="3"
    fill="#444466"
    opacity="1">SURVIVE · UPGRADE · DOMINATE</text>

  <!-- URL -->
  <text x="110" y="565"
    font-family="monospace, 'Courier New', Courier"
    font-size="15"
    letter-spacing="2"
    fill="#2a2a4a">case-beta-kappa.vercel.app</text>
</svg>
